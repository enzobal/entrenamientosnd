{% extends 'base.html' %}

{% load static %}  

{% block content %}
<link rel="stylesheet" href="{% static 'css/estilos.css' %}">

<div class="container mt-4" style="background: linear-gradient(to right, #ffefba, #ffffff); padding: 20px; border-radius: 15px; box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.2);">
    <div class="card shadow-lg p-4" style="border-radius: 15px;">
        <h2 class="text-center text-success mb-4" style="font-weight: bold; text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.2);">Crear Nuevo Plan de Nutrición</h2>

        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            
            <div class="mb-4">
                <h3 class="text-secondary" style="border-bottom: 2px solid #28a745; padding-bottom: 5px;">Datos del Plan de Nutrición</h3>
                <div class="form-group">
                    {{ form_nutricion.as_p }}
                </div>
            </div>

            <div class="mb-4">
                <h3 class="text-secondary" style="border-bottom: 2px solid #17a2b8; padding-bottom: 5px;">Asignar Clientes</h3>
                <div class="border p-3 rounded" style="background: #f8f9fa;">
                    {% for cliente in clientes %}
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="cliente_ids" value="{{ cliente.id }}" id="cliente{{ cliente.id }}">
                            <label class="form-check-label" for="cliente{{ cliente.id }}" style="font-weight: 500;">
                                {{ cliente.user.username }}
                            </label>
                        </div>
                    {% empty %}
                        <p class="text-muted">No hay clientes disponibles</p>
                    {% endfor %}
                </div>
            </div>

            <div class="text-center">
                <button type="submit" class="btn btn-success btn-lg" style="padding: 10px 20px; font-size: 18px; font-weight: bold; border-radius: 10px; box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.2); transition: 0.3s;">Guardar Plan Nutricional</button>
            </div>
        </form>
    </div>
</div>



<style>
/* imagen de fonde centrar y zoom
 */
     body {
    background: url("/static/images/boom.jpg") no-repeat center 30% fixed;
    background-size: 40%;
    font-family: Arial, sans-serif;
    color: #000000;
    background-position: center 50%;

}
/* fin */
</style>
{% endblock %}
